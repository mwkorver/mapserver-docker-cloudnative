<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Kentucky Imagery Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    #toolbar label { color: #444; white-space: nowrap; }

    #wms-url {
      width: 320px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    #apply-btn, #perf-toggle {
      padding: 4px 10px;
      background: #3388ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #perf-toggle { background: #5a5a5a; }
    #apply-btn:hover { background: #2266cc; }
    #perf-toggle:hover { background: #3a3a3a; }

    #map { height: 100%; width: 100%; }

    .layer-info {
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 160px;
    }
    .layer-info .layer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #444;
    }
    .layer-info .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .cog-label {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid rgba(224, 96, 32, 0.7);
      color: #7a2f10;
      font-size: 10px;
      font-weight: 600;
      padding: 1px 3px;
      pointer-events: none;
      white-space: nowrap;
    }

    .cog-labels-hidden .cog-label {
      display: none;
    }

    .tile-time-cell {
      align-items: center;
      border: 1px solid rgba(0, 0, 0, 0.2);
      box-sizing: border-box;
      display: flex;
      justify-content: center;
      pointer-events: none;
    }

    .tile-time-label {
      background: rgba(0, 0, 0, 0.72);
      border-radius: 3px;
      color: white;
      font: 600 12px/1.2 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 3px 5px;
      text-shadow: 0 1px 1px rgba(0, 0, 0, 0.6);
    }

    /* Performance panel */
    #perf-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 360px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 12px rgba(0,0,0,0.2);
      z-index: 1001;
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      display: flex;
      flex-direction: column;
      font-size: 12px;
    }
    #perf-panel.open { transform: translateX(0); }

    #perf-header {
      padding: 12px 14px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f8f8;
    }
    #perf-header h3 { font-size: 13px; font-weight: 600; color: #333; }
    #perf-header button {
      border: 1px solid #ccc;
      background: white;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #perf-header button:hover { background: #f0f0f0; }

    #perf-body {
      padding: 12px 14px;
      overflow-y: auto;
      flex: 1;
    }

    .perf-section { margin-bottom: 16px; }
    .perf-section h4 {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .perf-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px 10px;
      font-variant-numeric: tabular-nums;
    }
    .perf-stats .label { color: #666; }
    .perf-stats .value { color: #222; text-align: right; font-weight: 500; }

    .perf-meta {
      color: #999;
      font-size: 11px;
      margin-top: 4px;
    }

    table.req-table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }
    table.req-table th {
      text-align: left;
      color: #888;
      font-weight: 500;
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
    }
    table.req-table th.num { text-align: right; }
    table.req-table td {
      padding: 3px 6px;
      border-bottom: 1px solid #f5f5f5;
      color: #444;
    }
    table.req-table td.num { text-align: right; font-feature-settings: "tnum"; }
    table.req-table .slow { color: #c0392b; }
    table.req-table .ok { color: #27ae60; }

    .empty { color: #aaa; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>WMS URL:</label>
    <input id="wms-url" type="text" />
    <button id="apply-btn">Apply</button>
    <button id="perf-toggle">Perf</button>
  </div>
  <div id="map"></div>

  <div id="perf-panel">
    <div id="perf-header">
      <h3>Performance</h3>
      <div>
        <button id="perf-refresh">Refresh</button>
        <button id="perf-close">×</button>
      </div>
    </div>
    <div id="perf-body">
      <div class="perf-section">
        <h4>Server-side (MapServer)</h4>
        <div id="server-stats" class="empty">click Refresh</div>
      </div>
      <div class="perf-section">
        <h4>Client-side (Browser → ALB → Browser)</h4>
        <div id="client-stats" class="empty">pan/zoom to collect samples</div>
      </div>
      <div class="perf-section">
        <h4>Recent server requests</h4>
        <div id="recent-requests" class="empty">—</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost:8081/viewer/');
    }

    const PERF_API_URL = '';

    function loadViewerConfig() {
      try {
        const request = new XMLHttpRequest();
        request.open('GET', '/viewer/config.json', false);
        request.send(null);
        if (request.status >= 200 && request.status < 300) {
          return JSON.parse(request.responseText);
        }
      } catch (error) {
        console.warn('viewer config unavailable; using defaults', error);
      }
      return {};
    }

    const VIEWER_CONFIG = loadViewerConfig();
    const LOCAL_PREVIEW_BOUNDS = VIEWER_CONFIG.bounds || [[37.81, -85.51], [38.08, -85.25]];
    const IMAGERY_MIN_ZOOM = VIEWER_CONFIG.imageryMinZoom || 18;
    const COG_LABEL_MIN_ZOOM = 15;
    const WMS_LAYER_NAME = VIEWER_CONFIG.layerName || 'ky-2024';
    const MAP_NAME = VIEWER_CONFIG.mapName || 'ky-imagery';
    const FOOTPRINT_URL = VIEWER_CONFIG.footprintUrl || '/ky_20x20_tileindex.geojson';
    const ATTRIBUTION = VIEWER_CONFIG.attribution || 'Imagery collection';
    const DEFAULT_WMS_URL = window.location.origin + '/mapserv';
    const DEFAULT_VIEW = { center: VIEWER_CONFIG.center || [37.937085, -85.372578], zoom: IMAGERY_MIN_ZOOM - 1 };
    const map = L.map('map', { maxZoom: 22 }).setView(DEFAULT_VIEW.center, DEFAULT_VIEW.zoom);

    const LayerInfoControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'layer-info');
        this._div = div;
        this.update();
        return div;
      },
      update: function(count) {
        const zoom = map.getZoom();
        const countStr = count !== undefined ? ' (' + count + ')' : '';
        if (zoom < IMAGERY_MIN_ZOOM) {
          this._div.innerHTML =
            '<div class="layer-row"><span class="swatch" style="background:#e06020;opacity:0.6;border:1px solid #e06020"></span>COG Footprints' + countStr + '</div>' +
            '<div class="layer-row" style="color:#aaa;padding-left:18px">zoom in for imagery</div>' +
            '<div class="layer-row" style="color:#888;padding-left:18px;font-size:11px">zoom: ' + zoom + '</div>';
        } else {
          this._div.innerHTML =
            '<div class="layer-row"><span class="swatch" style="background:#e06020;opacity:0.6;border:1px solid #e06020"></span>COG Footprints' + countStr + '</div>' +
            '<div class="layer-row"><span class="swatch" style="background:#4a9eff"></span>WMS: ' + WMS_LAYER_NAME + '</div>' +
            '<div class="layer-row" style="color:#888;padding-left:18px;font-size:11px">zoom: ' + zoom + '</div>';
        }
      }
    });

    const layerInfo = new LayerInfoControl();
    layerInfo.addTo(map);

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxNativeZoom: 19,
      maxZoom: 22,
      opacity: 0.4
    });
    osm.addTo(map);

    let footprintsLayer = null;
    let ogcApiBase = null;
    const canvasRenderer = L.canvas();

    const localPreviewFootprint = L.rectangle(LOCAL_PREVIEW_BOUNDS, {
      color: '#e06020',
      weight: 1,
      fillOpacity: 0.04,
      interactive: false
    }).addTo(map);

    function fetchFootprints() {
      const url = FOOTPRINT_URL;

      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (footprintsLayer) {
            footprintsLayer.clearLayers();
            footprintsLayer.addData(data);
          } else {
            footprintsLayer = L.geoJSON(data, {
              renderer: canvasRenderer,
              style: { color: '#e06020', weight: 1, fillOpacity: 0.05, fillColor: '#e06020' },
              onEachFeature: bindCogLabel
            });
            footprintsLayer.addTo(map);
          }
          layerInfo.update(data.features ? data.features.length : 0);
        })
        .catch(err => console.warn('OGC API footprints error:', err));
    }

    function bindCogLabel(feature, layer) {
      const props = feature.properties || {};
      const label = props.file_name || (props.key ? props.key.split('/').pop() : props.location);
      if (!label) return;
      layer.bindTooltip(label, {
        permanent: true,
        direction: 'center',
        className: 'cog-label'
      });
    }

    function updateCogLabelVisibility() {
      map.getContainer().classList.toggle('cog-labels-hidden', map.getZoom() < COG_LABEL_MIN_ZOOM);
    }

    function onMoveEnd() {
      layerInfo.update();
      updateCogLabelVisibility();
      if (!map.hasLayer(localPreviewFootprint)) localPreviewFootprint.addTo(map);
      fetchFootprints();
    }

    map.on('moveend', onMoveEnd);
    updateCogLabelVisibility();

    // WMS imagery layer — shown at the imagery threshold, with client-side tile timing.
    let imageryLayer = null;
    let tileTimeLayer = null;
    const tileTimeCells = new Map();           // z/x/y -> label element
    const tileTimeValues = new Map();          // z/x/y -> label text
    const tileTimers = new WeakMap();        // tile -> startMs
    const clientSamples = [];                // rolling window of ms

    function tileKey(coords) {
      return coords.z + '/' + coords.x + '/' + coords.y;
    }

    function formatTileTime(ms) {
      return ms >= 1000 ? (ms / 1000).toFixed(2) + ' s' : Math.round(ms) + ' ms';
    }

    const TileTimeLayer = L.GridLayer.extend({
      createTile: function(coords) {
        const tile = document.createElement('div');
        tile.className = 'tile-time-cell';
        const label = document.createElement('div');
        label.className = 'tile-time-label';
        label.textContent = tileTimeValues.get(tileKey(coords)) || 'loading…';
        tile.appendChild(label);
        return tile;
      }
    });

    function buildTileTimeLayer() {
      return new TileTimeLayer({
        minZoom: IMAGERY_MIN_ZOOM,
        maxZoom: 22,
        tileSize: 256,
        pane: 'markerPane'
      }).on('tileunload', (e) => {
        tileTimeCells.delete(tileKey(e.coords));
      }).on('tileload', (e) => {
        const key = tileKey(e.coords);
        const label = e.tile.querySelector('.tile-time-label');
        tileTimeCells.set(key, label);
        label.textContent = tileTimeValues.get(key) || 'loading…';
      });
    }

    function buildWmsLayer(url) {
      const layer = L.tileLayer.wms(url, {
        layers: WMS_LAYER_NAME,
        format: 'image/png',
        transparent: false,
        version: '1.3.0',
        minZoom: IMAGERY_MIN_ZOOM,
        maxZoom: 22,
        keepBuffer: 1,
        updateWhenIdle: true,
        updateWhenZooming: false,
        attribution: ATTRIBUTION
      });
      layer.on('tileloadstart', (e) => {
        tileTimers.set(e.tile, performance.now());
        const key = tileKey(e.coords);
        tileTimeValues.set(key, 'loading…');
        const label = tileTimeCells.get(key);
        if (label) label.textContent = 'loading…';
      });
      layer.on('tileload', (e) => {
        const start = tileTimers.get(e.tile);
        if (start === undefined) return;
        const ms = performance.now() - start;
        const text = formatTileTime(ms);
        const key = tileKey(e.coords);
        tileTimeValues.set(key, text);
        const label = tileTimeCells.get(key);
        if (label) label.textContent = text;
        clientSamples.push(ms);
        if (clientSamples.length > 100) clientSamples.shift();
        renderClientStats();
      });
      layer.on('tileerror', (e) => {
        const key = tileKey(e.coords);
        tileTimeValues.set(key, 'error');
        const label = tileTimeCells.get(key);
        if (label) label.textContent = 'error';
      });
      return layer;
    }

    function applyUrl() {
      const url = document.getElementById('wms-url').value.trim();
      if (!url) return;
      ogcApiBase = new URL(url).origin + '/mapserv/' + MAP_NAME + '/ogcapi';
      if (imageryLayer) map.removeLayer(imageryLayer);
      if (tileTimeLayer) map.removeLayer(tileTimeLayer);
      tileTimeCells.clear();
      tileTimeValues.clear();
      imageryLayer = buildWmsLayer(url);
      tileTimeLayer = buildTileTimeLayer();
      imageryLayer.addTo(map);
      tileTimeLayer.addTo(map);
      fetchFootprints();
    }

    document.getElementById('wms-url').value = DEFAULT_WMS_URL;
    document.getElementById('apply-btn').addEventListener('click', applyUrl);
    document.getElementById('wms-url').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') applyUrl();
    });

    // ---------------- performance panel ----------------
    const panel = document.getElementById('perf-panel');
    const perfBody = {
      server: document.getElementById('server-stats'),
      client: document.getElementById('client-stats'),
      recent: document.getElementById('recent-requests'),
    };

    document.getElementById('perf-toggle').addEventListener('click', () => {
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) refreshServerStats();
    });
    document.getElementById('perf-close').addEventListener('click', () => {
      panel.classList.remove('open');
    });
    document.getElementById('perf-refresh').addEventListener('click', refreshServerStats);

    function pct(sortedArr, p) {
      if (sortedArr.length === 0) return null;
      const i = Math.min(sortedArr.length - 1, Math.floor(sortedArr.length * p));
      return sortedArr[i];
    }

    function fmtMs(s) {
      if (s == null) return '—';
      if (s < 1) return (s * 1000).toFixed(0) + ' ms';
      return s.toFixed(2) + ' s';
    }

    function statsBlock(samples, opts = {}) {
      // samples are in seconds for server, ms for client (opts.ms)
      const sec = opts.ms ? samples.map(x => x / 1000) : samples;
      if (sec.length === 0) return '<div class="empty">no samples yet</div>';
      const sorted = [...sec].sort((a,b) => a - b);
      const sum = sorted.reduce((a,b) => a + b, 0);
      const mean = sum / sorted.length;
      const median = pct(sorted, 0.5);
      const p95 = pct(sorted, 0.95);
      const p99 = pct(sorted, 0.99);
      return '<div class="perf-stats">' +
        '<div class="label">samples</div><div class="value">' + sorted.length + '</div>' +
        '<div class="label">min</div><div class="value">' + fmtMs(sorted[0]) + '</div>' +
        '<div class="label">mean</div><div class="value">' + fmtMs(mean) + '</div>' +
        '<div class="label">median</div><div class="value">' + fmtMs(median) + '</div>' +
        '<div class="label">p95</div><div class="value">' + fmtMs(p95) + '</div>' +
        '<div class="label">p99</div><div class="value">' + fmtMs(p99) + '</div>' +
        '<div class="label">max</div><div class="value">' + fmtMs(sorted[sorted.length-1]) + '</div>' +
        '</div>';
    }

    function renderClientStats() {
      perfBody.client.innerHTML =
        statsBlock(clientSamples, { ms: true }) +
        '<div class="perf-meta">rolling window of last 100 tiles loaded by Leaflet</div>';
    }

    function renderRecent(requests) {
      if (!requests.length) {
        perfBody.recent.innerHTML = '<div class="empty">no GetMap in window</div>';
        return;
      }
      const rows = requests.slice(0, 20).map(r => {
        const t = r.upstream_time_s;
        const cls = t > 2 ? 'slow' : (t < 0.5 ? 'ok' : '');
        const stamp = r.timestamp ? r.timestamp.replace('T',' ').slice(11, 19) : '';
        const kb = r.size ? (r.size / 1024).toFixed(0) : '0';
        return '<tr>' +
          '<td>' + stamp + '</td>' +
          '<td class="num ' + cls + '">' + t.toFixed(3) + 's</td>' +
          '<td class="num">' + kb + ' KB</td>' +
          '</tr>';
      }).join('');
      perfBody.recent.innerHTML =
        '<table class="req-table">' +
          '<thead><tr><th>time</th><th class="num">srv ms</th><th class="num">size</th></tr></thead>' +
          '<tbody>' + rows + '</tbody>' +
        '</table>' +
        '<div class="perf-meta">latest 20 of ' + requests.length + ' GetMap in last hour</div>';
    }

    async function refreshServerStats() {
      if (!PERF_API_URL) {
        perfBody.server.innerHTML = '<div class="empty">perf API disabled in local preview</div>';
        return;
      }
      perfBody.server.innerHTML = '<div class="empty">querying CloudWatch…</div>';
      try {
        const t0 = performance.now();
        const res = await fetch(PERF_API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        const queryMs = (performance.now() - t0).toFixed(0);
        const samples = data.requests.map(r => r.upstream_time_s);
        perfBody.server.innerHTML =
          statsBlock(samples) +
          '<div class="perf-meta">' + data.count + ' GetMap requests · ' +
          'window ' + data.window_hours + 'h · query ' + queryMs + 'ms</div>';
        renderRecent(data.requests);
      } catch (err) {
        perfBody.server.innerHTML = '<div class="empty">error: ' + err.message + '</div>';
      }
    }

    renderClientStats();
    applyUrl();
  </script>
</body>
</html>
