<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Imagery Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- OpenLayers assets served from this repo's GitHub Pages site.
       Pinned to a folder-versioned path (ol-10.0/) so bumping OL is an
       additive change — drop new files under ol-10.1/ and change the
       href/src below.  SRI hashes guard against tampering or stale CDN
       cache returning the wrong content. -->
  <link rel="stylesheet"
        href="https://mwkorver.github.io/mapserver-docker-cloudnative/viewer/vendor/ol-10.0/ol.css"
        integrity="sha384-Jpg1uvTciFJuHq+90Ly0/2SKRT9yS5OhbIN5FuFoFWji9fc44ok8xxO88CJi8Z5W"
        crossorigin="anonymous" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }

    /* suppress OL's rotate control; keep the zoom control (added below) */
    .ol-rotate { display: none; }
    /* nudge the zoom control down so it clears the centered top toolbar */
    .ol-zoom { top: 60px; left: 8px; }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    #toolbar label { color: #444; white-space: nowrap; }

    #collection-label {
      color: #222;
      font-weight: 600;
      white-space: nowrap;
    }

    #wms-url {
      width: 320px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    #apply-btn, #perf-toggle {
      padding: 4px 10px;
      background: #3388ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }
    #perf-toggle { background: #5a5a5a; }
    #apply-btn:hover { background: #2266cc; }
    #perf-toggle:hover { background: #3a3a3a; }

    #map { height: 100%; width: 100%; }

    #layer-info {
      position: absolute;
      top: 60px;
      right: 10px;
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 160px;
      pointer-events: none;
    }
    #layer-info .layer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #444;
    }
    #layer-info .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    /* Performance panel */
    #perf-panel {
      position: absolute;
      top: 0;
      right: 0;
      width: 360px;
      height: 100%;
      background: white;
      box-shadow: -2px 0 12px rgba(0,0,0,0.2);
      z-index: 1001;
      transform: translateX(100%);
      transition: transform 200ms ease-out;
      display: flex;
      flex-direction: column;
      font-size: 12px;
    }
    #perf-panel.open { transform: translateX(0); }

    #perf-header {
      padding: 12px 14px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #f8f8f8;
    }
    #perf-header h3 { font-size: 13px; font-weight: 600; color: #333; }
    #perf-header button {
      border: 1px solid #ccc;
      background: white;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
    }
    #perf-header button:hover { background: #f0f0f0; }

    .viewer-links {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 6px 10px;
      line-height: 1.4;
    }
    .viewer-links .label { color: #666; }
    .viewer-links a {
      color: #2266cc;
      overflow-wrap: anywhere;
      text-decoration: none;
    }
    .viewer-links a:hover { text-decoration: underline; }

    #perf-body {
      padding: 12px 14px;
      overflow-y: auto;
      flex: 1;
    }

    .perf-section { margin-bottom: 16px; }
    .perf-section h4 {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .perf-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px 10px;
      font-variant-numeric: tabular-nums;
    }
    .perf-stats .label { color: #666; }
    .perf-stats .value { color: #222; text-align: right; font-weight: 500; }

    .perf-meta {
      color: #999;
      font-size: 11px;
      margin-top: 4px;
    }

    table.req-table {
      width: 100%;
      border-collapse: collapse;
      font-variant-numeric: tabular-nums;
      font-size: 11px;
    }
    table.req-table th {
      text-align: left;
      color: #888;
      font-weight: 500;
      padding: 4px 6px;
      border-bottom: 1px solid #eee;
    }
    table.req-table th.num { text-align: right; }
    table.req-table td {
      padding: 3px 6px;
      border-bottom: 1px solid #f5f5f5;
      color: #444;
    }
    table.req-table td.num { text-align: right; font-feature-settings: "tnum"; }
    table.req-table .slow { color: #c0392b; }
    table.req-table .ok { color: #27ae60; }

    .empty { color: #aaa; font-style: italic; padding: 8px 0; }
  </style>
</head>
<body>
  <div id="toolbar">
    <span id="collection-label">Loading collection…</span>
    <label>WMS URL:</label>
    <input id="wms-url" type="text" />
    <button id="apply-btn">Apply</button>
    <button id="perf-toggle">Perf</button>
  </div>
  <div id="map"></div>
  <div id="layer-info"></div>

  <div id="perf-panel">
    <div id="perf-header">
      <h3>Performance</h3>
      <div>
        <button id="perf-refresh">Refresh</button>
        <button id="perf-close">×</button>
      </div>
    </div>
    <div id="perf-body">
      <div class="perf-section">
        <h4>Server-side (MapServer)</h4>
        <div id="server-stats" class="empty">click Refresh</div>
      </div>
      <div class="perf-section">
        <h4>Client-side (Browser → ALB → Browser)</h4>
        <div id="client-stats" class="empty">pan/zoom to collect samples</div>
      </div>
      <div class="perf-section">
        <h4>Recent server requests</h4>
        <div id="recent-requests" class="empty">—</div>
      </div>
      <div class="perf-section">
        <h4>Viewer links</h4>
        <div class="viewer-links">
          <div class="label">Layer</div><div id="viewer-layer-name">—</div>
          <div class="label">MapServer</div><div><a id="mapserv-link" href="/mapserv" target="_blank" rel="noopener">/mapserv</a></div>
          <div class="label">Capabilities</div><div><a id="capabilities-link" href="/mapserv?SERVICE=WMS&amp;VERSION=1.3.0&amp;REQUEST=GetCapabilities" target="_blank" rel="noopener">GetCapabilities</a></div>
          <div class="label">Config</div><div><a id="viewer-config-link" href="/viewer/config.json" target="_blank" rel="noopener">/viewer/config.json</a></div>
          <div class="label">Footprints</div><div><a id="footprints-link" href="#" target="_blank" rel="noopener">current bbox (WFS)</a></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://mwkorver.github.io/mapserver-docker-cloudnative/viewer/vendor/ol-10.0/ol.js"
          integrity="sha384-H9f6d9zpuIdeGwVsGIPSbRgWKZ8WRk2C1K7GxlC61fe5qjRCL/5Qvp2wUvUVDS8v"
          crossorigin="anonymous"></script>
  <script>
    if (window.location.protocol === 'file:') {
      window.location.replace('http://localhost:8080/viewer/');
    }

    /* ---- load viewer config (sync XHR at startup) ---- */
    const VIEWER_CONFIG = (function () {
      try {
        const xhr = new XMLHttpRequest();
        xhr.open('GET', '/viewer/config.json', false);
        xhr.send(null);
        if (xhr.status >= 200 && xhr.status < 300) return JSON.parse(xhr.responseText);
      } catch (e) { console.warn('viewer config unavailable; using defaults', e); }
      return {};
    })();

    /* ---- constants derived from viewer config ---- */
    const IMAGERY_MIN_ZOOM  = VIEWER_CONFIG.imageryMinZoom || 18;
    const IMAGERY_MAX_ZOOM  = VIEWER_CONFIG.imageryMaxZoom || Math.max(22, IMAGERY_MIN_ZOOM + 1);
    // NATIVE_ZOOM: the Web-Mercator zoom level where one screen pixel maps
    // to ~one source COG pixel (1:1).  The scanner computes this per COG
    // from ground sample distance and stores the collection median in
    // collections.json → viewer config.  Surfaced in the layer panel so a
    // user can tell when they're viewing imagery at true native detail.
    const NATIVE_ZOOM       = VIEWER_CONFIG.nativeZoom || (IMAGERY_MIN_ZOOM + 4);
    const COG_LABEL_MIN_ZOOM = 15;
    // collectionId drives the WFS layer name: cog-extents-{collectionId}
    const COLLECTION_ID     = VIEWER_CONFIG.collectionId || VIEWER_CONFIG.collectionName || '';
    const WMS_LAYER_NAME    = VIEWER_CONFIG.layerName || 'imagery';
    const WMS_LAYER_NAMES   = (Array.isArray(VIEWER_CONFIG.layerNames) && VIEWER_CONFIG.layerNames.length)
      ? VIEWER_CONFIG.layerNames : [WMS_LAYER_NAME];
    const ATTRIBUTION       = VIEWER_CONFIG.attribution || '';
    const DEFAULT_WMS_URL   = window.location.origin + '/mapserv';
    const CAPABILITIES_URL  = DEFAULT_WMS_URL + '?SERVICE=WMS&VERSION=1.3.0&REQUEST=GetCapabilities';
    const PERF_API_URL      = '';   // set by deployment; empty = disabled

    // viewer_config.center is [lat, lon] (Leaflet convention)
    const centerLatLon = VIEWER_CONFIG.center || [37.937085, -85.372578];
    const initialCenter = ol.proj.fromLonLat([centerLatLon[1], centerLatLon[0]]);
    const initialZoom   = NATIVE_ZOOM - 1;

    /* ---- mutable state ---- */
    let currentWmsSource = null;
    let wfsAbortCtrl     = null;         // AbortController for in-flight WFS request
    const tileTimers  = new WeakMap();   // tile object → start ms
    const timingFeatures = new Map();    // tileKey → ol.Feature
    const timingValues   = new Map();    // tileKey → label text
    const clientSamples  = [];           // rolling window of ms

    /* ---- helpers ---- */
    function tileKey(coord) { return coord[0] + '/' + coord[1] + '/' + coord[2]; }

    function formatTileTime(ms) {
      return ms >= 1000 ? (ms / 1000).toFixed(2) + ' s' : Math.round(ms) + ' ms';
    }

    function tileExtent3857(tileCoord, source) {
      const tg = (source && source.getTileGrid && source.getTileGrid())
        || ol.tilegrid.createXYZ({ maxZoom: 28 });
      return tg.getTileCoordExtent(tileCoord);
    }

    /* ---- styles ---- */
    // Footprint stroke is always visible.  At high zoom (>= FOOTPRINT_FILL_MIN_ZOOM)
    // we also paint a per-COG hashed-hue fill so the COG body is visible even
    // when its boundary is off-screen — important when zooming into a place
    // where 4 COGs meet and all 4 edges are off the viewport.  Adjacent COGs
    // hash to different hues (deterministic from file_name), so the seam
    // reads as a color discontinuity.
    // We skip the fill at low zoom because thousands of polygons stack alpha
    // at sub-pixel edges and bury the basemap.
    // Footprints: stroke only, no fill.  The user wants to see seams between
    // COGs but not have the imagery tinted.
    const FOOTPRINT_STROKE = new ol.style.Stroke({ color: '#e06020', width: 1 });
    const FOOTPRINT_BASE   = new ol.style.Style({ stroke: FOOTPRINT_STROKE });

    // Labels are on a SEPARATE layer (labelsLayer) with minZoom set at the layer
    // level, not inside a style function.  That way OL's renderer skips the layer
    // entirely below COG_LABEL_MIN_ZOOM — no style-function cache to worry about.
    const FOOTPRINT_LABEL_LIMIT = 500;
    let footprintCount = 0;

    function labelStyle(feature) {
      if (footprintCount > FOOTPRINT_LABEL_LIMIT) return null;
      const props = feature.getProperties();
      const label = props.file_name || (props.location ? props.location.split('/').pop() : '') || '';
      if (!label) return null;
      return new ol.style.Style({
        text: new ol.style.Text({
          text: label,
          font: '600 10px sans-serif',
          fill: new ol.style.Fill({ color: '#7a2f10' }),
          backgroundFill: new ol.style.Fill({ color: 'rgba(255,255,255,0.8)' }),
          backgroundStroke: new ol.style.Stroke({ color: 'rgba(224,96,32,0.7)', width: 1 }),
          padding: [1, 3, 1, 3],
          overflow: true,
        }),
      });
    }

    const TIMING_BORDER = new ol.style.Stroke({ color: 'rgba(0,0,0,0.2)', width: 1 });

    function timingStyle(feature) {
      const coord  = feature.get('coord');
      const text   = feature.get('timingText') || 'loading…';
      const z      = coord ? coord[0] : 0;
      const over   = z - NATIVE_ZOOM;
      const label  = over > 0 ? ('z' + z + ' over +' + over + '\n' + text) : text;
      return [
        new ol.style.Style({ stroke: TIMING_BORDER }),
        new ol.style.Style({
          text: new ol.style.Text({
            text: label,
            font: '600 12px/1.2 system-ui,sans-serif',
            fill: new ol.style.Fill({ color: 'white' }),
            backgroundFill: new ol.style.Fill({ color: 'rgba(0,0,0,0.72)' }),
            backgroundStroke: new ol.style.Stroke({ color: 'transparent', width: 0 }),
            padding: [3, 5, 3, 5],
          }),
        }),
      ];
    }

    /* ---- sources & layers ---- */
    // Full-opacity OSM stays useful at every zoom: it's the basemap below
    // z14 (no imagery yet) and peeks through gaps in imagery coverage above.
    // Imagery uses RGBA so empty areas are transparent rather than white.
    const osmLayer = new ol.layer.Tile({
      source: new ol.source.OSM(),
    });

    // footprintsSource uses OL's built-in bbox loader strategy.
    // wfsLoader is called automatically whenever the map viewport moves to an
    // extent that hasn't been loaded yet.  Calling source.clear() also resets
    // OL's loaded-extent tracking, so the next render re-fires the loader.
    const footprintsSource = new ol.source.Vector({
      loader:   COLLECTION_ID ? wfsLoader : undefined,
      strategy: ol.loadingstrategy.bbox,
    });
    // Footprints render at every zoom level (no minZoom).  Only the WMS
    // imagery layer is zoom-limited.  At world view individual COGs are
    // sub-pixel but the cluster is still informative.
    const footprintsLayer = new ol.layer.Vector({
      source: footprintsSource,
      style:  FOOTPRINT_BASE,
    });

    // labelsSource is populated from featuresloadend on footprintsSource.
    // Keeping it separate gives explicit, synchronous control over clearing.
    const labelsSource = new ol.source.Vector();
    const labelsLayer  = new ol.layer.Vector({
      source:  labelsSource,
      style:   labelStyle,
      minZoom: COG_LABEL_MIN_ZOOM,
    });

    // Sync labels whenever OL finishes loading a batch of footprint features.
    footprintsSource.on('featuresloadend', function (evt) {
      footprintCount = footprintsSource.getFeatures().length;
      labelsSource.clear();
      if (footprintCount <= FOOTPRINT_LABEL_LIMIT) {
        var labelFeats = (evt.features || []).map(function (f) {
          var center = ol.extent.getCenter(f.getGeometry().getExtent());
          var lf = new ol.Feature({ geometry: new ol.geom.Point(center) });
          lf.setProperties(f.getProperties());
          return lf;
        });
        labelsSource.addFeatures(labelFeats);
      }
      updateLayerInfo();
      refreshViewerLinks();
    });

    // OL layer minZoom is EXCLUSIVE ("visible above this zoom"), so to make
    // imagery + its timing overlay visible at zoom >= IMAGERY_MIN_ZOOM the
    // layer minZoom must be IMAGERY_MIN_ZOOM - 1.  Imagery is intentionally
    // bounded this way: below IMAGERY_MIN_ZOOM a single WMS tile would
    // mosaic hundreds of COGs — far too many byte-range reads per tile.
    const WMS_LAYER_MIN_ZOOM = IMAGERY_MIN_ZOOM - 1;

    const timingSource = new ol.source.Vector();
    const timingLayer  = new ol.layer.Vector({
      source: timingSource,
      style: timingStyle,
      minZoom: WMS_LAYER_MIN_ZOOM,
      updateWhileAnimating: false,
      updateWhileInteracting: false,
    });

    // WMS layer — source is swapped by applyUrl(); created here with default URL
    const wmsLayer = new ol.layer.Tile({ minZoom: WMS_LAYER_MIN_ZOOM });

    /* ---- map ---- */
    // eslint-disable-next-line no-var
    var map = new ol.Map({      // var so footprintStyle / timingStyle close over it
      target: 'map',
      controls: [new ol.control.Zoom()],   // +/- buttons, top-left
      view: new ol.View({
        center: initialCenter,
        zoom: initialZoom,
        maxZoom: IMAGERY_MAX_ZOOM,
        constrainResolution: true,   // snap to integer zoom levels (like Leaflet default)
      }),
      // layer order: OSM → WMS → timing overlay → footprint outlines → labels (top)
      layers: [osmLayer, wmsLayer, timingLayer, footprintsLayer, labelsLayer],
    });

    /* ---- WMS tile-timing callbacks ---- */
    function onTileLoadStart(evt) {
      tileTimers.set(evt.tile, performance.now());
      const key = tileKey(evt.tile.tileCoord);
      timingValues.set(key, null);   // mark as in-flight
      // create placeholder feature for the tile cell
      const extent = tileExtent3857(evt.tile.tileCoord, currentWmsSource);
      let feat = timingFeatures.get(key);
      if (!feat) {
        feat = new ol.Feature({ geometry: ol.geom.Polygon.fromExtent(extent) });
        timingSource.addFeature(feat);
        timingFeatures.set(key, feat);
      }
      feat.set('coord', evt.tile.tileCoord);
      feat.set('timingText', 'loading…');
    }

    function onTileLoadEnd(evt) {
      const start = tileTimers.get(evt.tile);
      if (start === undefined) return;
      const ms = performance.now() - start;
      const text = formatTileTime(ms);
      const key = tileKey(evt.tile.tileCoord);
      timingValues.set(key, text);
      const feat = timingFeatures.get(key);
      if (feat) feat.set('timingText', text);
      clientSamples.push(ms);
      if (clientSamples.length > 100) clientSamples.shift();
      renderClientStats();
    }

    function onTileLoadError(evt) {
      const key = tileKey(evt.tile.tileCoord);
      const feat = timingFeatures.get(key);
      if (feat) feat.set('timingText', 'error');
    }

    /* ---- WMS source builder ---- */
    function buildWmsSource(url) {
      const src = new ol.source.TileWMS({
        url: url,
        params: { LAYERS: WMS_LAYER_NAMES.join(','), FORMAT: 'image/png', VERSION: '1.3.0' },
        serverType: 'mapserver',
        // hidpi: false → request 256x256 @ MAP_RESOLUTION=90 instead of
        // 512x512 @ MAP_RESOLUTION=180 on retina displays.  For aerial
        // imagery the visual difference is negligible but server cost
        // and bandwidth drop ~4x.
        hidpi: false,
        attributions: ATTRIBUTION,
      });
      src.on('tileloadstart', onTileLoadStart);
      src.on('tileloadend',   onTileLoadEnd);
      src.on('tileloaderror', onTileLoadError);
      return src;
    }

    /* ---- footprints via WFS — OL-native loader ---- */

    // buildWfsUrl is still used by refreshViewerLinks() to show the live URL.
    function viewExtent4326() {
      const ext3857 = map.getView().calculateExtent(map.getSize());
      return ol.proj.transformExtent(ext3857, 'EPSG:3857', 'EPSG:4326');
    }

    function buildWfsUrl(ext4326) {
      // WFS 2.0.0 + EPSG:4326: axis order is lat,lon (OGC standard).
      const [minLon, minLat, maxLon, maxLat] = ext4326;
      return '/mapserv?SERVICE=WFS&VERSION=2.0.0&REQUEST=GetFeature'
        + '&TYPENAMES=cog-extents-' + encodeURIComponent(COLLECTION_ID)
        + '&OUTPUTFORMAT=geojson'
        + '&SRSNAME=EPSG%3A4326'
        + '&BBOX=' + minLat.toFixed(6) + ',' + minLon.toFixed(6) + ','
                   + maxLat.toFixed(6) + ',' + maxLon.toFixed(6) + ',EPSG%3A4326'
        // High enough to cover the largest collection in one fetch (KY
        // Season1 3in: 24,395 COGs).  Bbox still scopes the response —
        // small viewports get small responses; world view gets the whole
        // collection (a few MB) which is one-time on load.
        + '&COUNT=50000';
    }

    // OL calls this whenever the footprintsSource needs features for a new extent.
    // RETURNING A PROMISE is critical in OL 10+: with the callback API,
    // OL only fires the loadend event but does NOT add the features to the
    // source.  In Promise mode, OL handles addFeatures() automatically.
    function wfsLoader(extent, resolution, projection) {
      if (wfsAbortCtrl) wfsAbortCtrl.abort();
      wfsAbortCtrl = new AbortController();
      const ext4326 = ol.proj.transformExtent(extent, projection, 'EPSG:4326');
      const url = buildWfsUrl(ext4326);
      return fetch(url, { signal: wfsAbortCtrl.signal })
        .then(function (r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.json();
        })
        .then(function (geojson) {
          return new ol.format.GeoJSON().readFeatures(geojson, {
            dataProjection: 'EPSG:4326',
            featureProjection: projection,
          });
        })
        .catch(function (err) {
          if (err.name === 'AbortError') return [];   // swallow aborts silently
          console.warn('WFS loader error:', err);
          throw err;                                  // propagate real errors
        });
    }

    function clearFootprints() {
      if (wfsAbortCtrl) { wfsAbortCtrl.abort(); wfsAbortCtrl = null; }
      footprintCount = 0;
      labelsSource.clear();
      // refresh() (not clear()!) is what resets OL's loadedExtentsRtree —
      // clear() only removes the features.  Without refresh() the next
      // render thinks the current extent is already loaded and never
      // re-fires wfsLoader.
      footprintsSource.refresh();
    }

    /* ---- layer info panel ---- */
    function updateLayerInfo() {
      const zoom    = Math.round(map.getView().getZoom() || 0);
      const showWms = zoom >= IMAGERY_MIN_ZOOM;

      let html = '<div class="layer-row">'
        + '<span class="swatch" style="background:#e06020;opacity:0.6;border:1px solid #e06020"></span>'
        + 'COG Footprints (' + footprintCount + ')'
        + '</div>';

      if (showWms) {
        html += '<div class="layer-row">'
          + '<span class="swatch" style="background:#4a9eff"></span>'
          + 'WMS: ' + WMS_LAYER_NAMES.join(', ')
          + '</div>';
        // Native-resolution status — only meaningful while imagery is shown.
        // NATIVE_ZOOM is the Web-Mercator zoom where one screen pixel maps
        // to ~one source COG pixel (scanner-derived, collection median).
        var dz = zoom - NATIVE_ZOOM;
        if (dz === 0) {
          html += '<div class="layer-row" style="padding-left:18px;font-size:11px;'
            + 'color:#1a7f37;font-weight:600">★ native resolution · z'
            + NATIVE_ZOOM + ' · 1:1 pixels</div>';
        } else {
          var rel = dz > 0 ? '+' + dz + ' · upsampled' : dz + ' · downsampled';
          html += '<div class="layer-row" style="padding-left:18px;font-size:11px;'
            + 'color:#999">native z' + NATIVE_ZOOM + ' · ' + rel + '</div>';
        }
      } else {
        // Imagery is intentionally OFF when zoomed out: one WMS tile at this
        // scale would mosaic hundreds of COGs — too many byte-range reads.
        // Make the off-state explicit instead of letting imagery silently
        // vanish, and say plainly how to bring it back.
        html += '<div class="layer-row" style="color:#aaa" '
          + 'title="Imagery is disabled when zoomed out — one WMS tile here '
          + 'would mosaic hundreds of COGs. Zoom in to z' + IMAGERY_MIN_ZOOM + '.">'
          + '<span class="swatch" style="background:#4a9eff;opacity:0.25"></span>'
          + 'WMS: off</div>';
        html += '<div class="layer-row" style="padding-left:18px;font-size:11px;'
          + 'color:#999">zoom in to z' + IMAGERY_MIN_ZOOM + ' for imagery</div>';
      }

      html += '<div class="layer-row" style="color:#888;padding-left:18px;font-size:11px">zoom: ' + zoom + '</div>';
      document.getElementById('layer-info').innerHTML = html;
    }

    /* ---- viewer links ---- */
    function refreshViewerLinks() {
      document.getElementById('collection-label').textContent =
        VIEWER_CONFIG.collectionName || WMS_LAYER_NAME;
      document.getElementById('viewer-layer-name').textContent = WMS_LAYER_NAMES.join(', ');

      var mapservLink = document.getElementById('mapserv-link');
      mapservLink.href = DEFAULT_WMS_URL;

      var capsLink = document.getElementById('capabilities-link');
      capsLink.href = CAPABILITIES_URL;

      var cfgLink = document.getElementById('viewer-config-link');
      cfgLink.href = window.location.origin + '/viewer/config.json';

      if (COLLECTION_ID) {
        var wfsUrl = buildWfsUrl(viewExtent4326());
        var fpLink = document.getElementById('footprints-link');
        fpLink.href = wfsUrl;
      }
    }

    /* ---- map events ---- */
    map.on('moveend', function () {
      // Prune timing features that are out of view OR at a stale zoom level.
      var viewExt  = map.getView().calculateExtent(map.getSize());
      var viewZoom = Math.round(map.getView().getZoom() || 0);
      timingFeatures.forEach(function (feat, key) {
        var geom      = feat.getGeometry();
        var coord     = feat.get('coord');
        var outOfView = geom && !ol.extent.intersects(viewExt, geom.getExtent());
        var wrongZoom = coord && coord[0] !== viewZoom;
        if (outOfView || wrongZoom) {
          timingSource.removeFeature(feat);
          timingFeatures.delete(key);
          timingValues.delete(key);
        }
      });

      // Force a tile re-fetch so the overlay timing labels appear on
      // every revisit, not just first load.  OL otherwise serves tiles
      // from its in-memory cache with no tileloadstart/end events, so
      // the overlay would be blank for a previously-loaded view.
      // The refetch is a fresh WMS render (MapServer sends no
      // Cache-Control) — but with a warm GDAL block cache + nginx
      // range cache it is typically much faster than the cold load,
      // which is the number worth seeing.
      if (currentWmsSource) currentWmsSource.refresh();

      updateLayerInfo();
      refreshViewerLinks();
    });

    /* ---- toolbar: apply URL ---- */
    function applyUrl() {
      var url = document.getElementById('wms-url').value.trim();
      if (!url) return;

      timingSource.clear();
      timingFeatures.clear();
      timingValues.clear();
      clearFootprints();

      currentWmsSource = buildWmsSource(url);
      wmsLayer.setSource(currentWmsSource);
    }

    document.getElementById('wms-url').value = DEFAULT_WMS_URL;
    document.getElementById('apply-btn').addEventListener('click', applyUrl);
    document.getElementById('wms-url').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') applyUrl();
    });

    /* ---- performance panel ---- */
    var panel = document.getElementById('perf-panel');
    var perfBody = {
      server: document.getElementById('server-stats'),
      client: document.getElementById('client-stats'),
      recent: document.getElementById('recent-requests'),
    };

    document.getElementById('perf-toggle').addEventListener('click', function () {
      panel.classList.toggle('open');
      if (panel.classList.contains('open')) refreshServerStats();
    });
    document.getElementById('perf-close').addEventListener('click', function () {
      panel.classList.remove('open');
    });
    document.getElementById('perf-refresh').addEventListener('click', refreshServerStats);

    function pct(sorted, p) {
      if (!sorted.length) return null;
      return sorted[Math.min(sorted.length - 1, Math.floor(sorted.length * p))];
    }

    function fmtMs(s) {
      if (s == null) return '—';
      if (s < 1) return (s * 1000).toFixed(0) + ' ms';
      return s.toFixed(2) + ' s';
    }

    function statsBlock(samples, opts) {
      var ms   = opts && opts.ms;
      var sec  = ms ? samples.map(function (x) { return x / 1000; }) : samples;
      if (!sec.length) return '<div class="empty">no samples yet</div>';
      var sorted = sec.slice().sort(function (a, b) { return a - b; });
      var sum    = sorted.reduce(function (a, b) { return a + b; }, 0);
      var mean   = sum / sorted.length;
      return '<div class="perf-stats">'
        + '<div class="label">samples</div><div class="value">' + sorted.length + '</div>'
        + '<div class="label">min</div><div class="value">'    + fmtMs(sorted[0]) + '</div>'
        + '<div class="label">mean</div><div class="value">'   + fmtMs(mean) + '</div>'
        + '<div class="label">median</div><div class="value">' + fmtMs(pct(sorted, 0.5)) + '</div>'
        + '<div class="label">p95</div><div class="value">'    + fmtMs(pct(sorted, 0.95)) + '</div>'
        + '<div class="label">p99</div><div class="value">'    + fmtMs(pct(sorted, 0.99)) + '</div>'
        + '<div class="label">max</div><div class="value">'    + fmtMs(sorted[sorted.length - 1]) + '</div>'
        + '</div>';
    }

    function renderClientStats() {
      perfBody.client.innerHTML = statsBlock(clientSamples, { ms: true })
        + '<div class="perf-meta">rolling window of last 100 tiles loaded</div>';
    }

    function renderRecent(requests) {
      if (!requests.length) {
        perfBody.recent.innerHTML = '<div class="empty">no GetMap in window</div>';
        return;
      }
      var rows = requests.slice(0, 20).map(function (r) {
        var t   = r.upstream_time_s;
        var cls = t > 2 ? 'slow' : (t < 0.5 ? 'ok' : '');
        var stamp = r.timestamp ? r.timestamp.replace('T', ' ').slice(11, 19) : '';
        var kb    = r.size ? (r.size / 1024).toFixed(0) : '0';
        return '<tr>'
          + '<td>' + stamp + '</td>'
          + '<td class="num ' + cls + '">' + t.toFixed(3) + 's</td>'
          + '<td class="num">' + kb + ' KB</td>'
          + '</tr>';
      }).join('');
      perfBody.recent.innerHTML
        = '<table class="req-table">'
        + '<thead><tr><th>time</th><th class="num">srv ms</th><th class="num">size</th></tr></thead>'
        + '<tbody>' + rows + '</tbody>'
        + '</table>'
        + '<div class="perf-meta">latest 20 of ' + requests.length + ' GetMap in last hour</div>';
    }

    async function refreshServerStats() {
      if (!PERF_API_URL) {
        perfBody.server.innerHTML = '<div class="empty">perf API disabled in local preview</div>';
        return;
      }
      perfBody.server.innerHTML = '<div class="empty">querying CloudWatch…</div>';
      try {
        var t0  = performance.now();
        var res = await fetch(PERF_API_URL);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        var data = await res.json();
        var queryMs = (performance.now() - t0).toFixed(0);
        var samples = data.requests.map(function (r) { return r.upstream_time_s; });
        perfBody.server.innerHTML = statsBlock(samples)
          + '<div class="perf-meta">' + data.count + ' GetMap requests · '
          + 'window ' + data.window_hours + 'h · query ' + queryMs + 'ms</div>';
        renderRecent(data.requests);
      } catch (err) {
        perfBody.server.innerHTML = '<div class="empty">error: ' + err.message + '</div>';
      }
    }

    /* ---- initial render ---- */
    renderClientStats();
    applyUrl();
  </script>
</body>
</html>
