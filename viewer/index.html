<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NZ Imagery Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    #toolbar label { color: #444; white-space: nowrap; }

    #wms-url {
      width: 320px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    #apply-btn {
      padding: 4px 10px;
      background: #3388ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #apply-btn:hover { background: #2266cc; }

    #map { height: 100%; width: 100%; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>WMS URL:</label>
    <input id="wms-url" type="text" value="http://localhost:8080/mapserv" />
    <button id="apply-btn">Apply</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([-36.87, 174.77], 13);

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxZoom: 19,
      opacity: 0.4
    });
    osm.addTo(map);

    let imageryLayer = null;

    function buildWmsLayer(url) {
      return L.tileLayer.wms(url, {
        layers: 'auckland-2024',
        format: 'image/png',
        transparent: false,
        version: '1.3.0',
        attribution: 'Land Information New Zealand'
      });
    }

    function applyUrl() {
      const url = document.getElementById('wms-url').value.trim();
      if (!url) return;
      if (imageryLayer) {
        map.removeLayer(imageryLayer);
      }
      imageryLayer = buildWmsLayer(url);
      imageryLayer.addTo(map);
    }

    document.getElementById('apply-btn').addEventListener('click', applyUrl);
    document.getElementById('wms-url').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') applyUrl();
    });

    applyUrl();
  </script>
</body>
</html>
