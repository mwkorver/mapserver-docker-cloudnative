<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>NZ Imagery Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: sans-serif; }

    #toolbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }

    #toolbar label { color: #444; white-space: nowrap; }

    #wms-url {
      width: 320px;
      padding: 4px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
    }

    #apply-btn {
      padding: 4px 10px;
      background: #3388ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    #apply-btn:hover { background: #2266cc; }

    #map { height: 100%; width: 100%; }

    .layer-info {
      background: white;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1.5;
      min-width: 160px;
    }
    .layer-info .layer-row {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #444;
    }
    .layer-info .swatch {
      width: 12px;
      height: 12px;
      border-radius: 2px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>WMS URL:</label>
    <input id="wms-url" type="text" value="http://mapserver-1286789374.us-west-2.elb.amazonaws.com/mapserv" />
    <button id="apply-btn">Apply</button>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { maxZoom: 20 }).setView([-36.87, 174.77], 13);

    const LayerInfoControl = L.Control.extend({
      options: { position: 'topright' },
      onAdd: function() {
        const div = L.DomUtil.create('div', 'layer-info');
        this._div = div;
        this.update();
        return div;
      },
      update: function() {
        const zoom = map.getZoom();
        if (zoom < 18) {
          this._div.innerHTML =
            '<div class="layer-row"><span class="swatch" style="background:#e06020;opacity:0.6;border:1px solid #e06020"></span>COG Tile Footprints</div>' +
            '<div class="layer-row" style="color:#aaa;padding-left:18px">zoom in for imagery</div>';
        } else {
          this._div.innerHTML =
            '<div class="layer-row"><span class="swatch" style="background:#4a9eff"></span>WMS: auckland-2024</div>';
        }
      }
    });

    const layerInfo = new LayerInfoControl();
    layerInfo.addTo(map);
    map.on('zoomend', function() { layerInfo.update(); });

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
      maxNativeZoom: 19,
      maxZoom: 20,
      opacity: 0.4
    });
    osm.addTo(map);

    // COG tile footprints — shown at zoom < 18
    let footprintsLayer = null;

    const canvasRenderer = L.canvas();

    function loadFootprints(baseUrl) {
      const url = baseUrl.replace('/mapserv', '/tile_extents.geojson');
      fetch(url)
        .then(r => r.json())
        .then(data => {
          if (footprintsLayer) map.removeLayer(footprintsLayer);
          footprintsLayer = L.geoJSON(data, {
            renderer: canvasRenderer,
            style: {
              color: '#e06020',
              weight: 1,
              fillOpacity: 0.05,
              fillColor: '#e06020'
            }
          });
          function updateFootprints() {
            if (map.getZoom() < 18) {
              if (!map.hasLayer(footprintsLayer)) footprintsLayer.addTo(map);
            } else {
              if (map.hasLayer(footprintsLayer)) map.removeLayer(footprintsLayer);
            }
          }
          map.on('zoomend', updateFootprints);
          updateFootprints();
        })
        .catch(err => console.warn('Could not load tile extents:', err));
    }

    // WMS imagery layer — shown at zoom >= 18
    let imageryLayer = null;

    function buildWmsLayer(url) {
      return L.tileLayer.wms(url, {
        layers: 'auckland-2024',
        format: 'image/png',
        transparent: false,
        version: '1.3.0',
        minZoom: 18,
        maxZoom: 20,
        attribution: 'Land Information New Zealand'
      });
    }

    function applyUrl() {
      const url = document.getElementById('wms-url').value.trim();
      if (!url) return;
      if (imageryLayer) map.removeLayer(imageryLayer);
      imageryLayer = buildWmsLayer(url);
      imageryLayer.addTo(map);
      loadFootprints(url);
    }

    document.getElementById('apply-btn').addEventListener('click', applyUrl);
    document.getElementById('wms-url').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') applyUrl();
    });

    applyUrl();
  </script>
</body>
</html>
