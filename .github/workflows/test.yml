name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pytest
        run: python -m pip install --upgrade pip pytest

      # The unit tests are hermetic: osgeo/boto3/psycopg2 are all lazily
      # imported, and the one GDAL-dependent test class is guarded with
      # skipif and runs only inside the container image where GDAL exists.
      - name: Run unit tests
        run: python -m pytest -q
