# Disk-backed cache for COG byte-range fetches. Lives in http context so a
# single shared cache is used by all FastCGI workers — fixes per-worker
# VSI cache fragmentation.
#   - 4 GB on-disk, well under Fargate's 20 GB ephemeral storage
#   - 128 MB metadata zone (fits ~1M cache entries)
#   - 24h freshness; entries idle 24h are evicted
#   - use_temp_path=off avoids a useless cross-fs rename
proxy_cache_path /var/cache/nginx/cog
    levels=1:2
    keys_zone=cog:128m
    max_size=4g
    inactive=24h
    use_temp_path=off;
