# supervisord fcgi-program does not appear to work directly without a
# proxy. This nginx conf proxies from port 80 to the mapserver fcgi
# listening on TCP port 9090.
server {
    # json_metrics format defined in /etc/nginx/conf.d/json_log.conf
    access_log /dev/stdout json_metrics;
    listen 80;
    server_name localhost;

    location /tile_extents.geojson {
        alias /usr/src/mapfiles/tile_extents.geojson;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Content-Type' 'application/json';
    }

    location /ky_20x20_tileindex.geojson {
        alias /usr/src/mapfiles/ky_20x20_tileindex.geojson;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Content-Type' 'application/json';
        add_header 'Cache-Control' 'no-store';
    }

    location /nj_2020_footprints_3857.geojson {
        alias /usr/src/mapfiles/nj_2020_footprints_3857.geojson;
        add_header 'Access-Control-Allow-Origin' '*';
        add_header 'Content-Type' 'application/json';
        add_header 'Cache-Control' 'no-store';
    }

    location = / {
        return 302 /viewer/;
    }

    location /viewer/ {
        alias /usr/src/viewer/;
        index index.html;
        try_files $uri $uri/ /viewer/index.html;
    }

    location /admin/ {
        alias /usr/src/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/config.json {
        proxy_pass http://127.0.0.1:9100/config;
        proxy_http_version 1.1;
        add_header 'Cache-Control' 'no-store';
    }

    location = /viewer/config.json {
        proxy_pass http://127.0.0.1:9100/viewer-config;
        proxy_http_version 1.1;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/api/runtime {
        proxy_pass http://127.0.0.1:9100/runtime;
        proxy_http_version 1.1;
        proxy_read_timeout 20s;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/api/nginx-cache {
        proxy_pass http://127.0.0.1:9100/nginx-cache;
        proxy_http_version 1.1;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/api/collections {
        proxy_pass http://127.0.0.1:9100/collections;
        proxy_http_version 1.1;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/api/numprocs {
        proxy_pass http://127.0.0.1:9100/numprocs;
        proxy_http_version 1.1;
        proxy_read_timeout 20s;
        add_header 'Cache-Control' 'no-store';
    }

    location = /admin/api/collections/scan {
        proxy_pass http://127.0.0.1:9100/collections/scan;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        client_max_body_size 8k;
        add_header 'Cache-Control' 'no-store';
    }

    location ~ ^/admin/api/jobs(/.*)?$ {
        rewrite ^/admin/api(/.*)$ $1 break;
        proxy_pass http://127.0.0.1:9100;
        proxy_http_version 1.1;
        proxy_read_timeout 20s;
        add_header 'Cache-Control' 'no-store';
    }

    # Regex location required for fastcgi_split_path_info to work.
    # PATH_INFO carries the OGC API route (e.g. /ogcapi/collections/...).
    # WMS requests (/mapserv?SERVICE=WMS&...) work unchanged — PATH_INFO
    # is empty when there is no path segment after /mapserv.
    location ~ ^/mapserv {
        add_header 'Access-Control-Allow-Origin' '*';

        fastcgi_split_path_info ^(/mapserv)(/.+)$;
        fastcgi_pass unix:/var/run/mapserver.sock;

        include fastcgi_params;
        fastcgi_param PATH_INFO       $fastcgi_path_info;
        fastcgi_param SCRIPT_NAME     /mapserv;
        fastcgi_param SCRIPT_FILENAME /usr/local/bin/mapserv;

        fastcgi_keep_conn on;
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;

        error_log stderr error;
    }
}

# Local cache proxy in front of the KyFromAbove S3 bucket. GDAL hits this via
# /vsicurl/http://localhost:8001/<path>, nginx serves cached byte ranges
# from disk and forwards misses to a local SigV4 signing proxy. The signer
# uses container/task IAM credentials for private S3; cache hits do not need
# signing or an upstream S3 request.
# All FastCGI workers share the same cache — eliminates per-process
# VSI cache fragmentation.
server {
    # cog_cache_metrics format defined in /etc/nginx/conf.d/json_log.conf
    access_log /dev/stdout cog_cache_metrics;

    listen 127.0.0.1:8001;
    server_name localhost;

    location / {
        proxy_cache cog;
        # Range-aware key: each Range: bytes=N-M is its own cache entry.
        # GDAL /vsicurl opens a COG with a HEAD request first to learn object
        # size and metadata. nginx proxy_cache defaults to converting a HEAD
        # cache miss into a GET so the response can also satisfy future GETs;
        # for ~GB COGs that turns a cheap S3 metadata probe into a possible
        # full-object origin fetch/cache fill. Keep HEAD and GET cache entries
        # separate, and keep HEAD requests as actual upstream HEAD requests.
        proxy_cache_key   "$request_method:$request_uri:$http_range";
        proxy_cache_convert_head off;
        proxy_cache_valid 200 206 24h;
        proxy_cache_valid 404 1m;
        proxy_cache_lock  on;
        proxy_cache_use_stale error timeout updating;

        # Forward cache misses to the local S3 signer. Keep Range intact:
        # it is part of the cache key and is also signed upstream.
        proxy_set_header Range $http_range;
        proxy_pass http://127.0.0.1:9000;

        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_read_timeout 30s;

        # Optional: surface cache status as a response header so we can see
        # HIT/MISS/REVALIDATED/EXPIRED in tcpdump / curl -v.
        add_header X-Cache-Status $upstream_cache_status always;
        error_log stderr warn;
    }
}
